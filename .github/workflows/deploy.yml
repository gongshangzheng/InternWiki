name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Unified cache: pnpm store + node_modules
      - name: Cache dependencies
        uses: actions/cache@v4
        id: dep-cache
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/web/node_modules
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: deps-

      - name: Install dependencies
        if: steps.dep-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      # Only rebuild Velite content when content files changed
      - name: Check content changes
        id: content-check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && git diff --name-only ${{ github.event.before }}..HEAD 2>/dev/null | grep -qE '^apps/web/content/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Cache Velite output so content-only changes don't require rebuild
      - name: Cache Velite output
        uses: actions/cache@v4
        with:
          path: apps/web/src/content/.velite
          key: velite-${{ hashFiles('apps/web/content/**/*.md') }}

      - name: Build content
        if: steps.content-check.outputs.changed == 'true'
        run: pnpm content:build

      - name: Build app (skip velite, reuse cached output)
        run: pnpm build:app

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
